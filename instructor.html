<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard - AI Detection Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .ksu-brand-bar {
            background: #000;
            color: #FFC72C;
            padding: 12px 24px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFC72C;
            max-width: 1400px;
            margin: 0 auto;
        }

        .ksu-brand-bar .ksu-logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .ksu-brand-bar .ksu-dept {
            font-size: 0.8rem;
            color: rgba(255, 199, 44, 0.7);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            color: #000;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #000;
        }

        .submissions {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .submission-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .submission-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .submission-card.high-risk {
            border-color: #ff4444;
            background: #fff5f5;
        }

        .submission-card.medium-risk {
            border-color: #ffaa00;
            background: #fffbf0;
        }

        .submission-card.low-risk {
            border-color: #00cc66;
            background: #f0fff8;
        }

        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .student-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .timestamp {
            color: #666;
            font-size: 0.9em;
        }

        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .risk-badge.high {
            background: #ff4444;
            color: white;
        }

        .risk-badge.medium {
            background: #ffaa00;
            color: white;
        }

        .risk-badge.low {
            background: #00cc66;
            color: white;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .text-preview {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .text-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, #f8f9fa);
        }

        .expand-btn {
            background: #FFC72C;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .expand-btn:hover {
            background: #e6b325;
        }

        .details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .details.expanded {
            display: block;
        }

        .keystroke-log {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85em;
        }

        .refresh-btn {
            background: #000;
            color: #FFC72C;
            border: 2px solid #FFC72C;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #1a1a1a;
        }

        .no-submissions {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-submissions h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="ksu-brand-bar">
        <span class="ksu-logo-text">KENNESAW STATE UNIVERSITY</span>
    </div>
    <div class="container">
        <header>
            <h1>Instructor Dashboard</h1>
            <p id="context-subtitle">Discussion AI Detection &amp; Typing Pattern Monitor</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Submissions</h3>
                <div class="value" id="total-submissions">0</div>
            </div>
            <div class="stat-card">
                <h3>High Risk</h3>
                <div class="value" style="color: #ff4444;" id="high-risk-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Medium Risk</h3>
                <div class="value" style="color: #ffaa00;" id="medium-risk-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Low Risk</h3>
                <div class="value" style="color: #00cc66;" id="low-risk-count">0</div>
            </div>
        </div>

        <div class="submissions">
            <button class="refresh-btn" onclick="loadSubmissions()">🔄 Refresh Posts</button>
            <div id="submissions-list"></div>
        </div>
    </div>

    <script>
        async function loadSubmissions() {
            try {
                const response = await fetch('/api/instructor/posts');
                const submissions = await response.json();
                
                displaySubmissions(submissions);
                updateStats(submissions);
            } catch (error) {
                console.error('Error loading submissions:', error);
                document.getElementById('submissions-list').innerHTML = 
                    '<div class="no-submissions"><h2>Error loading submissions</h2><p>' + error.message + '</p></div>';
            }
        }

        function updateStats(submissions) {
            document.getElementById('total-submissions').textContent = submissions.length;
            
            let highRisk = 0, mediumRisk = 0, lowRisk = 0;
            
            submissions.forEach(sub => {
                const risk = calculateRisk(sub);
                if (risk === 'high') highRisk++;
                else if (risk === 'medium') mediumRisk++;
                else lowRisk++;
            });
            
            document.getElementById('high-risk-count').textContent = highRisk;
            document.getElementById('medium-risk-count').textContent = mediumRisk;
            document.getElementById('low-risk-count').textContent = lowRisk;
        }

        function calculateRisk(submission) {
            return calculateCompositeRisk(submission).risk;
        }

        function calculateCompositeRisk(submission) {
            // Use server-persisted score if available
            if (typeof submission.compositeScore === 'number') {
                return {
                    score: submission.compositeScore,
                    risk: submission.compositeRisk || (submission.compositeScore >= 60 ? 'high' : submission.compositeScore >= 30 ? 'medium' : 'low')
                };
            }
            // Fallback: compute client-side for older submissions
            const ta = submission.typingAnalytics || {};
            const aiProb = submission.aiResults?.documents?.[0]?.completely_generated_prob || 0;
            const typingSuspicion = ta.suspicionScore || 0;
            const suspiciousRefocusCount = ta.suspiciousRefocusCount || 0;
            const injectionCount = ta.suspectedInjections?.length || 0;
            const wpmSpikeCount = ta.wpmSpikeCount || 0;
            const correctionRatio = ta.correctionRatio ?? 0.05;
            const pasteAttempts = ta.pasteAttempts || 0;

            let score = 0;

            // GPTZero AI probability (weighted 35%)
            score += aiProb * 35;

            // Typing suspicion score (weighted 25%)
            score += (typingSuspicion / 100) * 25;

            // Focus changes with text growth (weighted 15%)
            score += Math.min(suspiciousRefocusCount * 5, 15);

            // DOM injections (weighted 10%)
            score += Math.min(injectionCount * 5, 10);

            // Low correction ratio — suspiciously clean typing (weighted 8%)
            if (correctionRatio < 0.01 && (submission.totalKeystrokes || 0) > 100) {
                score += 8;
            } else if (correctionRatio < 0.03 && (submission.totalKeystrokes || 0) > 100) {
                score += 4;
            }

            // WPM spikes (weighted 5%)
            score += Math.min(wpmSpikeCount * 2.5, 5);

            // Paste attempts (weighted 2%)
            score += Math.min(pasteAttempts * 1, 2);

            score = Math.min(100, Math.round(score));

            return {
                score,
                risk: score >= 60 ? 'high' : score >= 30 ? 'medium' : 'low'
            };
        }

        function displaySubmissions(submissions) {
            const container = document.getElementById('submissions-list');
            
            if (submissions.length === 0) {
                container.innerHTML = '<div class="no-submissions"><h2>No submissions yet</h2><p>Student submissions will appear here</p></div>';
                return;
            }
            
            submissions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            container.innerHTML = submissions.map((sub, index) => {
                const composite = calculateCompositeRisk(sub);
                const risk = composite.risk;
                const ta = sub.typingAnalytics || {};
                const aiProb = (sub.aiResults?.documents?.[0]?.completely_generated_prob || 0) * 100;
                const typingSuspicion = ta.suspicionScore || 0;
                const avgDelay = ta.avgDelay || 0;
                const pasteAttempts = ta.pasteAttempts || 0;
                const wordCount = sub.wordCount || 0;
                const totalKeystrokes = sub.totalKeystrokes || 0;
                const sessionDuration = sub.sessionDuration ? Math.round(sub.sessionDuration / 60000) : 0;
                const studentName = sub.authorName || sub.studentDisplayName || sub.studentName || 'Anonymous';
                const studentEmail = sub.authorEmail || sub.studentEmail || '';
                const postType = sub.parentId ? '↩️ Reply' : '📝 Post';
                const correctionRatio = ta.correctionRatio ?? '-';
                const suspiciousRefocuses = ta.suspiciousRefocusCount || 0;
                const injections = ta.suspectedInjections?.length || 0;
                const wpmSpikes = ta.wpmSpikeCount || 0;
                
                return `
                    <div class="submission-card ${risk}-risk">
                        <div class="submission-header">
                            <div>
                                <div class="student-name">${postType} ${studentName}</div>
                                <div class="timestamp">${studentEmail} &bull; ${new Date(sub.timestamp).toLocaleString()}</div>
                            </div>
                            <span class="risk-badge ${risk}">${risk.toUpperCase()} RISK (${composite.score}/100)</span>
                        </div>
                        
                        <div class="metrics">
                            <div class="metric">
                                <div class="metric-label">AI Probability</div>
                                <div class="metric-value">${aiProb.toFixed(1)}%</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Typing Suspicion</div>
                                <div class="metric-value">${typingSuspicion}%</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Correction Ratio</div>
                                <div class="metric-value">${typeof correctionRatio === 'number' ? (correctionRatio * 100).toFixed(1) + '%' : correctionRatio}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Tab Switches (Suspicious)</div>
                                <div class="metric-value">${suspiciousRefocuses}${injections > 0 ? ' + ' + injections + ' inject' : ''}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">WPM Spikes / Paste Attempts</div>
                                <div class="metric-value">${wpmSpikes} / ${pasteAttempts}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Words / Keystrokes / ${sessionDuration}min</div>
                                <div class="metric-value">${wordCount} / ${totalKeystrokes}</div>
                            </div>
                        </div>
                        
                        <div class="text-preview">
                            ${(sub.text || '').substring(0, 200)}...
                        </div>
                        
                        <button class="expand-btn" onclick="toggleDetails(${index})">View Full Details</button>
                        
                        <div class="details" id="details-${index}">
                            <h4>GPTZero AI Detection Results:</h4>
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                                ${formatGPTZeroResults(sub.aiResults)}
                            </div>
                            
                            <h4>Full Text:</h4>
                            <div class="text-preview" style="max-height: none;">
                                ${sub.text || 'No text available'}
                            </div>
                            
                            <h4 style="margin-top: 20px;">Keystroke Log (${sub.keystrokeLog?.length || 0} keystrokes):</h4>
                            <div class="keystroke-log">
                                ${formatKeystrokeLog(sub.keystrokeLog)}
                            </div>
                            
                            <h4 style="margin-top: 20px;">Session Timeline:</h4>
                            <div class="keystroke-log">
                                ${formatTimeline(sub.typingAnalytics?.sessionTimeline)}
                            </div>
                            
                            <h4 style="margin-top: 20px;">Detection Breakdown:</h4>
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em;">
                                <div><strong>Composite Score:</strong> ${composite.score}/100</div>
                                <div><strong>AI Probability:</strong> ${aiProb.toFixed(1)}%</div>
                                <div><strong>Typing Suspicion:</strong> ${typingSuspicion}%</div>
                                <div><strong>Correction Ratio:</strong> ${typeof correctionRatio === 'number' ? (correctionRatio * 100).toFixed(1) + '%' : '-'}</div>
                                <div><strong>Backspace/Delete:</strong> ${ta.backspaceCount || 0} / ${ta.deleteCount || 0}</div>
                                <div><strong>Avg Delay:</strong> ${avgDelay}ms</div>
                                <div><strong>Suspicious Tab Switches:</strong> ${suspiciousRefocuses}</div>
                                <div><strong>DOM Injections:</strong> ${injections}</div>
                                <div><strong>WPM Spikes:</strong> ${wpmSpikes}</div>
                                <div><strong>Paste Attempts:</strong> ${pasteAttempts}</div>
                                <div><strong>Rapid Bursts:</strong> ${ta.rapidBurstCount || 0}</div>
                                <div><strong>Long Pauses:</strong> ${ta.longPauseCount || 0}</div>
                            </div>
                            
                            <div class="grade-section" style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffc107;">
                                <h4 style="margin: 0 0 10px 0;">Grade Student${sub.grade != null ? ` — Current: ${sub.grade}/100` : ''}</h4>
                                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                                    <label style="font-weight: bold;">Score (0-100):</label>
                                    <input type="number" id="grade-input-${index}" min="0" max="100" value="${sub.grade || ''}" 
                                        style="width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                                    <label style="font-weight: bold;">Feedback:</label>
                                    <input type="text" id="feedback-input-${index}" placeholder="Optional feedback" value="${sub.gradeFeedback || ''}"
                                        style="flex: 1; min-width: 150px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                                    <button onclick="submitGrade('${sub.authorId}', ${index})" 
                                        style="padding: 8px 16px; background: #ffc520; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                                        Send Grade to D2L
                                    </button>
                                </div>
                                <div id="grade-status-${index}" style="margin-top: 8px; font-size: 0.9em;"></div>
                                ${sub.gradedAt ? `<div style="margin-top: 5px; font-size: 0.85em; color: #666;">Last graded: ${new Date(sub.gradedAt).toLocaleString()} by ${sub.gradedBy || 'instructor'}</div>` : ''}
                            </div>
                            
                            <details style="margin-top: 15px;">
                                <summary style="cursor: pointer; font-weight: bold; padding: 8px;">Raw Typing Analytics JSON</summary>
                                <pre style="background: #f8f9fa; padding: 15px; border-radius: 8px; overflow-x: auto; max-height: 300px; font-size: 0.8em;">
${JSON.stringify(sub.typingAnalytics, null, 2)}
                                </pre>
                            </details>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatGPTZeroResults(aiResults) {
            if (!aiResults || !aiResults.documents || aiResults.documents.length === 0) {
                return '<p>No AI detection data available</p>';
            }
            
            const doc = aiResults.documents[0];
            
            let html = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                    <div>
                        <strong>Overall AI Probability:</strong><br>
                        <span style="font-size: 24px; color: ${doc.completely_generated_prob > 0.5 ? '#e74c3c' : '#27ae60'};">
                            ${(doc.completely_generated_prob * 100).toFixed(1)}%
                        </span>
                    </div>
                    <div>
                        <strong>Average Perplexity:</strong><br>
                        <span style="font-size: 20px;">${doc.average_generated_prob?.toFixed(3) || 'N/A'}</span>
                    </div>
                    <div>
                        <strong>Class:</strong><br>
                        <span style="font-size: 20px; font-weight: bold; color: ${doc.class === 'ai' ? '#e74c3c' : '#27ae60'};">
                            ${doc.class?.toUpperCase() || 'N/A'}
                        </span>
                    </div>
                </div>
            `;
            
            // Sentence-level analysis
            if (doc.sentences && doc.sentences.length > 0) {
                html += `
                    <h5 style="margin-top: 15px; margin-bottom: 10px;">Sentence-Level Analysis (${doc.sentences.length} sentences):</h5>
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px;">
                `;
                
                doc.sentences.forEach((sentence, idx) => {
                    const aiProb = (sentence.generated_prob || 0) * 100;
                    const bgColor = aiProb > 70 ? '#ffe6e6' : aiProb > 40 ? '#fff4e6' : '#e6f7e6';
                    
                    html += `
                        <div style="background: ${bgColor}; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid ${aiProb > 70 ? '#e74c3c' : aiProb > 40 ? '#f39c12' : '#27ae60'};">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <strong>Sentence ${idx + 1}</strong>
                                <span style="font-weight: bold; color: ${aiProb > 70 ? '#e74c3c' : aiProb > 40 ? '#f39c12' : '#27ae60'};">
                                    AI: ${aiProb.toFixed(1)}%
                                </span>
                            </div>
                            <div style="font-size: 14px; color: #555;">
                                "${sentence.sentence}"
                            </div>
                            <div style="font-size: 12px; color: #777; margin-top: 5px;">
                                Perplexity: ${sentence.perplexity?.toFixed(2) || 'N/A'}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // Paragraph-level analysis
            if (doc.paragraphs && doc.paragraphs.length > 0) {
                html += `
                    <h5 style="margin-top: 15px; margin-bottom: 10px;">Paragraph-Level Analysis:</h5>
                    <div style="display: grid; gap: 10px;">
                `;
                
                doc.paragraphs.forEach((para, idx) => {
                    const aiProb = (para.generated_prob || 0) * 100;
                    html += `
                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px;">
                            <strong>Paragraph ${idx + 1}:</strong> AI Probability: 
                            <span style="color: ${aiProb > 50 ? '#e74c3c' : '#27ae60'}; font-weight: bold;">
                                ${aiProb.toFixed(1)}%
                            </span>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            return html;
        }

        function formatKeystrokeLog(log) {
            if (!log || log.length === 0) return 'No keystroke data available';
            
            return log.map((entry, i) => {
                // Support both full and summarized formats
                const time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() :
                             entry.t ? new Date(entry.t).toLocaleTimeString() : '?';
                const key = entry.key || entry.k || '?';
                const prevTime = i > 0 ? (log[i-1].timestamp || log[i-1].t || 0) : 0;
                const curTime = entry.timestamp || entry.t || 0;
                const delay = i > 0 && prevTime ? curTime - prevTime : 0;
                return `[${time}] Key: "${key}" | Delay: ${delay}ms`;
            }).join('\n');
        }

        function formatTimeline(timeline) {
            if (!timeline || timeline.length === 0) return '<em>No timeline data available</em>';
            
            const icons = {
                session_started: '🟢',
                window_blur: '👁️‍🗨️',
                window_focus: '👁️',
                suspicious_refocus: '⚠️',
                dom_injection: '🔴',
                wpm_spike: '📈',
                paste_blocked: '🚫',
                submitted: '✅'
            };
            
            return timeline.map(e => {
                const mins = Math.floor(e.elapsed / 60);
                const secs = e.elapsed % 60;
                const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
                const icon = icons[e.type] || '•';
                const isSuspicious = ['suspicious_refocus', 'dom_injection', 'wpm_spike'].includes(e.type);
                const style = isSuspicious ? 'color: #e74c3c; font-weight: bold;' : '';
                return `<span style="${style}">${icon} [${timeStr}] ${e.description}</span>`;
            }).join('\n');
        }

        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            details.classList.toggle('expanded');
            
            const btn = event.target;
            btn.textContent = details.classList.contains('expanded') ? 'Hide Details' : 'View Full Details';
        }

        async function submitGrade(authorId, index) {
            const scoreInput = document.getElementById(`grade-input-${index}`);
            const feedbackInput = document.getElementById(`feedback-input-${index}`);
            const statusDiv = document.getElementById(`grade-status-${index}`);
            const score = parseInt(scoreInput.value);

            if (isNaN(score) || score < 0 || score > 100) {
                statusDiv.innerHTML = '<span style="color: #e74c3c;">Please enter a score between 0 and 100</span>';
                return;
            }

            statusDiv.innerHTML = '<span style="color: #666;">Sending grade to D2L...</span>';

            try {
                const response = await fetch('/api/instructor/grade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        authorId,
                        score,
                        feedback: feedbackInput.value || ''
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    statusDiv.innerHTML = `<span style="color: #27ae60; font-weight: bold;">✅ ${result.message}</span>`;
                } else {
                    statusDiv.innerHTML = `<span style="color: #e74c3c;">❌ ${result.error}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color: #e74c3c;">❌ Network error. Please try again.</span>';
            }
        }

        // Fetch context info
        async function loadContext() {
            try {
                const response = await fetch('/api/user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('context-subtitle').textContent =
                        `${user.resourceLinkTitle || 'Discussion'} — ${user.contextTitle || 'AI Detection Monitor'}`;
                }
            } catch (e) {}
        }

        // Auto-refresh every 15 seconds
        setInterval(loadSubmissions, 15000);
        
        // Load on page load
        loadContext();
        loadSubmissions();
    </script>
</body>
</html>
